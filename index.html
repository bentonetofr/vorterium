<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Hanken+Grotesk:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Campaign Lab</title>
    <!--
      Aplica o tema salvo ANTES do React montar para evitar
      flash de tema errado (FOUC — Flash of Unstyled Content).
    -->
    <script>
      (function () {
        var t = localStorage.getItem('campaign-lab-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
